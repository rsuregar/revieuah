name: Publish to npm

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version_type:
        description: "Version bump type (untuk manual publish)"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

# Jangan jalankan lagi setelah push hasil version bump (hindari loop)
permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    # Saat push ke main: jalankan hanya jika commit BUKAN hasil version bump
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && !contains(github.event.head_commit.message, '[skip ci]'))
    env:
      VERSION_BUMP: ${{ github.event.inputs.version_type || 'patch' }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build
        run: yarn build

      - name: Configure Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Bump version and publish
        run: |
          npm version ${{ env.VERSION_BUMP }} -m "chore: release %s [skip ci]"
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Push tags and commits
        run: git push --follow-tags
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
