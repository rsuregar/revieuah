# Copy this file to your GitLab repo as .gitlab-ci.yml (or include it).
# Required CI/CD variables (Settings > CI/CD > Variables):
#   REVIUAH_API_KEY  — your LLM API key
#   GITLAB_TOKEN     — GitLab personal/project access token with api scope (or use CI_JOB_TOKEN)
#
# Optional variables:
#   REVIUAH_PROVIDER_URL  — override provider URL
#   REVIUAH_MAX_DIFF_SIZE — max diff chars (default 120000)

stages:
  - review

code-review:
  stage: review
  image: node:20
  only:
    - merge_requests
  variables:
    GIT_DEPTH: 0
  script:
    - npm install -g reviuah

    # Run review and save output
    - >
      reviuah
      --range origin/$CI_MERGE_REQUEST_TARGET_BRANCH_NAME...HEAD
      --out review.md
      --lang en
      || true

    # Post comment on MR (update existing or create new)
    - |
      if [ ! -s review.md ]; then
        echo "No review output, skipping comment."
        exit 0
      fi

      API_URL="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/merge_requests/${CI_MERGE_REQUEST_IID}/notes"
      TOKEN="${GITLAB_TOKEN:-$CI_JOB_TOKEN}"
      MARKER="<!-- reviuah-review -->"

      # Check for existing comment
      EXISTING_ID=$(curl -sf --header "PRIVATE-TOKEN: $TOKEN" "$API_URL?per_page=100" \
        | python3 -c "
      import json, sys
      notes = json.load(sys.stdin)
      for n in notes:
          if '$MARKER' in n.get('body',''):
              print(n['id'])
              break
      " 2>/dev/null || true)

      REVIEW_BODY=$(cat review.md)
      COMMENT_BODY="$MARKER
      # 🔍 ReviuAh — AI Code Review

      $REVIEW_BODY"

      if [ -n "$EXISTING_ID" ]; then
        curl -sf --request PUT --header "PRIVATE-TOKEN: $TOKEN" \
          --data-urlencode "body=$COMMENT_BODY" \
          "$API_URL/$EXISTING_ID" > /dev/null
        echo "Updated existing review comment."
      else
        curl -sf --request POST --header "PRIVATE-TOKEN: $TOKEN" \
          --data-urlencode "body=$COMMENT_BODY" \
          "$API_URL" > /dev/null
        echo "Posted new review comment."
      fi
