name: Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      REVIUAH_API_KEY: ${{ secrets.REVIUAH_API_KEY }}
      REVIUAH_ENABLE_SUMMARY: ${{ vars.REVIUAH_ENABLE_SUMMARY || '1' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Node 22 LTS
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install ReviuAh
        run: npm install -g reviuah@latest

      # Skip review steps for fork PRs (no access to secrets)
      - name: Run overall review
        if: env.REVIUAH_API_KEY != '' && env.REVIUAH_ENABLE_SUMMARY != '0'
        run: reviuah --range origin/${{ github.base_ref }}...HEAD --out review.md --lang en
        env:
          REVIUAH_PROVIDER: ${{ vars.REVIUAH_PROVIDER || 'gemini' }}
          REVIUAH_MODEL: ${{ vars.REVIUAH_MODEL }}
          REVIUAH_MAX_DIFF_SIZE: 60000

      - name: Run per-file review
        if: secrets.REVIUAH_API_KEY != ''
        run: reviuah --range origin/${{ github.base_ref }}...HEAD --per-file --out review.json --lang en
        env:
          REVIUAH_PROVIDER: ${{ vars.REVIUAH_PROVIDER || 'gemini' }}
          REVIUAH_MODEL: ${{ vars.REVIUAH_MODEL }}
          REVIUAH_MAX_DIFF_SIZE: 60000

      # 3. Post overall summary as PR comment (create or update)
      - name: Post summary comment
        if: success() && env.REVIUAH_ENABLE_SUMMARY != '0' && hashFiles('review.md') != ''
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('review.md', 'utf8').trim();
            if (!body) return;

            const marker = '<!-- reviuah-review -->';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body?.includes(marker));
            const content = `${marker}\n# 🔍 ReviuAh — AI Code Review\n\n${body}`;

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: content,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: content,
              });
            }

      # 4. Post per-file inline comments as a PR review
      - name: Post inline review comments
        if: success() && hashFiles('review.json') != ''
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const raw = fs.readFileSync('review.json', 'utf8').trim();
            if (!raw) return;

            let data;
            try { data = JSON.parse(raw); } catch { return; }

            // Only post inline comments when risk is medium or higher
            const risk = (data.risk || 'unknown').toLowerCase();
            if (risk !== 'medium' && risk !== 'high') {
              console.log(`Risk level is "${risk}" — skipping inline comments.`);
              return;
            }
            if (!data.comments || data.comments.length === 0) return;

            // Dismiss previous ReviuAh reviews to avoid duplicates
            const { data: reviews } = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            for (const r of reviews) {
              if (r.body?.includes('<!-- reviuah-inline -->') && r.state === 'COMMENTED') {
                try {
                  await github.rest.pulls.dismissReview({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    pull_number: context.issue.number,
                    review_id: r.id,
                    message: 'Superseded by new ReviuAh review.',
                  });
                } catch { /* dismiss may fail if not approved/changes_requested */ }
              }
            }

            // Map severity to emoji
            const emoji = { critical: '🔴', warning: '🟡', suggestion: '💡', praise: '✅' };

            // Build review comments array (include optional suggestionCode as code block)
            const prComments = data.comments
              .filter(c => c.path && c.line > 0 && c.body)
              .map(c => {
                let body = `${emoji[c.severity] || '💡'} **${c.severity}**: ${c.body}`;
                if (c.suggestionCode && c.suggestionCode.trim()) {
                  body += `\n\n**Suggested fix:**\n\`\`\`\n${c.suggestionCode.trim()}\n\`\`\``;
                }
                return { path: c.path, line: c.line, side: 'RIGHT', body };
              });

            if (prComments.length === 0) return;

            const summaryLine = `<!-- reviuah-inline -->\n🔍 **ReviuAh per-file review** — ${prComments.length} comment(s), risk: **${data.risk || 'unknown'}**`;

            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              commit_id: context.payload.pull_request.head.sha,
              body: summaryLine,
              event: 'COMMENT',
              comments: prComments,
            });
